(() => {
  const el = document.querySelector("#create-form");

  const loadingEl = ".loading" ? document.querySelector(".loading") : null;
  if (loadingEl) loadingEl.style.display = "none";

  el.addEventListener("submit", async (e) => {
    if ("submit" === "submit") e.preventDefault();

    const swapSelector = "#post-result";
    const target =
      swapSelector
        ? document.querySelector(swapSelector)
        : (el.querySelector("[data-result]") || el.querySelector(".result") || el);

    if (loadingEl) loadingEl.style.display = "";

    try {
      const data = {};

      if (el.tagName === "FORM") {
        new FormData(el).forEach((v, k) => { data[k] = v; });
      } else if (el.name || el.value !== undefined) {
        data[el.name || "value"] = el.value;
      }

      let finalUrl = "https://jsonplaceholder.typicode.com/posts";
      Object.keys(data).forEach(key => {
        const regex = new RegExp(":" + key, "g");
        if (regex.test(finalUrl)) {
          finalUrl = finalUrl.replace(regex, encodeURIComponent(data[key]));
          if ("json" === "param") delete data[key];
        }
      });

      const options = {
        method: "POST",
        headers: { "Content-Type": "application/json" }
      };

      if (options.method !== "GET") {
        options.body = JSON.stringify(data);
      }

      const res = await fetch(finalUrl, options);
      if (!res.ok) throw new Error("Server Error: " + res.status);

      const resultData = await res.json();

      const parse = (tpl, item) => {
        return tpl.split("{").map((part, i) => {
          if (i === 0) return part;
          const [path, ...rest] = part.split("}");
          const value = path.split(".").reduce((obj, key) => obj?.[key], item);
          return (value !== undefined && value !== null ? value : "") + rest.join("}");
        }).join("");
      };

      if (target && `<div>✅ Created ID: {id}</div>`) {
        target.innerHTML = parse(`<div>✅ Created ID: {id}</div>`, resultData);
      }

      if (loadingEl && loadingEl !== target) {
        loadingEl.style.display = "none";
      }

      ((r) => {
    console.log(r);
  })(resultData);

    } catch (err) {
      if (loadingEl && loadingEl !== target) {
        loadingEl.style.display = "none";
      }

      ((r) => console.error(r.message))({ message: err.message });
    }
  });
})();
