<html><body>
  <script>
    const parse = (tpl, data) => {
  if (typeof data !== "object" || data === null || Array.isArray(data)) {
    return tpl;
  }

  const resolve = (obj, path) => {
    return path
      .replace(/\[(\w+)\]/g, ".$1")
      .split(".")
      .reduce((acc, key) => {
        if (acc == null || typeof acc !== "object") return "";
        return acc[key];
      }, obj);
  };

  return tpl.replace(/\{([^}]+)\}/g, (_, expr) => {
    const value = resolve(data, expr.trim());
    return value == null || typeof value === "object" ? "" : value;
  });
};
    
  window.fetchData = (config = {}) => {
    const {
      url,
      targets = [],
      templates = [],
      dataKeys = [],
      loading = "",
      onSuccess = (data) => {},
      onError = (err) => console.error(err),
      refetchInterval = 0
    } = config;

    const targetEls = targets.map(t => document.querySelector(t));
    const loadingEl = loading ? document.querySelector(loading) : null;

    const resolvePath = (obj, path) => {
      if (!path) return obj;
      return path
        .replace(/\[(\w+)\]/g, ".$1")
        .split(".")
        .reduce((acc, key) => acc?.[key], obj);
    };

    const doFetch = async () => {
      try {
        if (loadingEl) loadingEl.style.display = "";

        const res = await window.fetch(url);
        if (!res.ok) throw new Error("HTTP " + res.status);

        const data = await res.json();

        if (loadingEl) loadingEl.style.display = "none";

        targets.forEach((_, i) => {
          const targetEl = targetEls[i];
          const template = templates[i];
          const key = dataKeys[i];

          if (!targetEl || !template) return;

          const content = resolvePath(data, key);
          const items = Array.isArray(content) ? content : [content];

          const html = items.map(item => parse(template, item)).join("");
          targetEl.innerHTML = html;
        });

        onSuccess(data);
      } catch (e) {
        if (loadingEl) loadingEl.style.display = "none";
        onError(e);
      } finally {
        if (refetchInterval > 0) setTimeout(doFetch, refetchInterval);
      }
    };

    doFetch();
  };
  
    
  window.action = (selector, config = {}) => {
    const {
      on = "submit",
      url,
      method = "POST",
      targets = [],
      templates = [],
      dataKeys = [],
      loading = "",
      onSuccess = (data) => {},
      onError = (err) => {}
    } = config;

    const el = document.querySelector(selector);
    if (!el) return;

    const targetEls = targets.map(t => document.querySelector(t));
    const loadingEl = loading ? document.querySelector(loading) : null;

    const resolvePath = (obj, path) => {
      if (!path) return obj;
      return path
        .replace(/\[(\w+)\]/g, ".$1")
        .split(".")
        .reduce((acc, key) => acc?.[key], obj);
    };

    el.addEventListener(on, async (e) => {
      if (on === "submit") e.preventDefault();

      if (loadingEl) loadingEl.style.display = "";

      try {
        const formData = {};

        if (el.tagName === "FORM") {
          new FormData(el).forEach((v, k) => { formData[k] = v; });
        } else {
          formData[el.name || "value"] = el.value;
        }

        let finalUrl = url;
        const bodyData = { ...formData };

        Object.keys(formData).forEach(key => {
          const placeholder = ":" + key;
          if (finalUrl.includes(placeholder)) {
            finalUrl = finalUrl.replace(placeholder, encodeURIComponent(formData[key]));
            delete bodyData[key];
          }
        });

        const isGet = method.toUpperCase() === "GET";

        if (isGet) {
          const params = new URLSearchParams(bodyData).toString();
          if (params) finalUrl += (finalUrl.includes("?") ? "&" : "?") + params;
        }

        const res = await window.fetch(finalUrl, {
          method: method.toUpperCase(),
          headers: !isGet ? { "Content-Type": "application/json" } : {},
          body: !isGet ? JSON.stringify(bodyData) : null
        });

        if (!res.ok) throw new Error("Status: " + res.status);

        const result = await res.json();

        if (loadingEl) loadingEl.style.display = "none";

        targets.forEach((_, i) => {
          const targetEl = targetEls[i];
          const template = templates[i];
          const key = dataKeys[i];

          if (!targetEl || !template) return;

          const content = resolvePath(result, key);
          const items = Array.isArray(content) ? content : [content];

          const html = items.map(item => parse(template, item)).join("");
          targetEl.innerHTML = html;
        });

        onSuccess(result);
      } catch (err) {
        if (loadingEl) loadingEl.style.display = "none";
        onError(err);
      }
    });
  };
  
  </script>
  <h1>Rick and Morty Characters</h1><div id="character-list"></div><span id="loader" style="display:none">Loading...</span><h1>Search Character</h1><div id="search-result"></div><form id="search-form"><input name="name" placeholder="Character name (e.g. Rick)"><button type="submit">Search</button></form><script>window.fetchData({"url":"https://rickandmortyapi.com/api/character","loading":"#loader","targets":["#character-list"],"dataKeys":["results"],"templates":["<div><img src=\"{image}\" width=\"80\"><div><strong>{name}</strong><p>Status: {status}</p><p>Species: {species}</p></div></div>"]});window.action("#search-form", {"url":"https://rickandmortyapi.com/api/character/?name=:name","method":"GET","targets":["#search-result"],"dataKeys":["results"],"templates":["<div><img src=\"{image}\" width=\"120\"><div><strong>{name}</strong><p>Status: {status}</p><p>Species: {species}</p><p>Origin: {origin.name}</p></div></div>"]});</script></body></html>
